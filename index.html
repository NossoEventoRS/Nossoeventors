<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NossoEventoRS</title>

<style>
* { box-sizing: border-box; } /* Garante que o padding não quebre a largura */

body {
  margin: 0;
  font-family: 'Georgia', serif;
  color: #fff;
  background-image: url('https://raw.githubusercontent.com/NossoEventoRS/Nossoeventors/refs/heads/main/A4_hori.png');
  background-position: center top;
  background-size: cover; /* Melhor para preencher a tela do celular */
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-color: #000; 
}

/* CAMADA ESCURA */
.overlay {
  background: rgba(0,0,0,0.7);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LOGO - Ajustado para não sumir no topo */
.logo {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 20px;
  width: 100%;
}

.logo img {
  width: 90%;
  max-width: 500px; /* Tamanho máximo controlado */
  height: auto;
}

/* TÍTULO */
.titulo {
  text-align: center;
  max-width: 800px;
  margin-bottom: 20px;
}

.titulo h2 {
  font-size: 28px; /* Reduzido para caber em telas menores */
  color: #f5d27a;
  margin-bottom: 10px;
}

.titulo h3 {
  font-size: 16px;
  color: #f5d27a;
  font-weight: normal;
  line-height: 1.4;
}

.titulo p {
  font-size: 15px;
  margin-top: 15px;
  padding: 0 10px;
}

/* FORMULÁRIO */
.form-container {
  width: 100%;
  max-width: 400px;
}

.form-box {
  background: rgba(0,0,0,0.85);
  border: 2px solid #d4af37;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(212,175,55,0.4);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #d4af37;
  background: #1a1a1a;
  color: #fff;
  font-size: 16px; /* Evita que o iPhone dê zoom automático no input */
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(#d4af37, #a67c00);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  font-size: 18px;
  text-transform: uppercase;
}

/* TEXTO ABAIXO */
.info {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
  line-height: 1.5;
}

/* CONTATO */
.contato {
  text-align: center;
  margin-top: 30px;
  padding-bottom: 20px;
}

.contato img {
  height: 60px; /* Tamanho mais equilibrado para o Instagram */
}

/* AJUSTES PARA TELAS GRANDES (PC) */
@media (min-width: 768px) {
  .titulo h2 { font-size: 40px; }
  .titulo h3 { font-size: 22px; }
  .logo { margin-top: -50px; } /* Só usa margem negativa em telas grandes se necessário */
}
</style>
</head>

<body>

<div class="overlay">

  <div class="logo">
    <img src="https://raw.githubusercontent.com/NossoEventoRS/Nossoeventors/refs/heads/main/Logo.png" alt="Logo">
  </div>

  <div class="titulo">
    <h2>Divulgue seu evento tradicionalista!</h2>
    <h3>Secretaria para rodeios | Gestão de inscrições | Estrutura para avaliadores | Sonorização</h3>

    <p>
      Promova seu evento com a gente! Preencha o formulário, entraremos em contato:
    </p>
  </div>

  <div class="form-container">
    <div class="form-box">
      <form id="form">
        <input type="text" name="Nome" placeholder="Nome" required>
        <input type="email" name="E-mail" placeholder="E-mail" required>
        <input type="tel" name="Telefone" placeholder="Telefone" required>
        <textarea name="Mensagem" rows="4" placeholder="Mensagem"></textarea>
        <button type="submit" id="submitBtn">ENVIAR MENSAGEM</button>
      </form>

      <div class="info">
        Seu evento ganhará destaque com <b>NossoEventoRS</b>.<br>
        Estamos prontos para ajudar!
      </div>
    </div>
  </div>

  <div class="contato">
    <a href="https://www.instagram.com/nossoeventors/" target="_blank">
      <img src="https://raw.githubusercontent.com/NossoEventoRS/Nossoeventors/refs/heads/main/instagran.png" alt="Instagram">
    </a>
  </div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxmlfR3Oamk5HJAPzFZrYWseymjbDhzLqxgz-bQdVRDSBU_GgiwZTR3szzYid9UxHVjLA/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "ENVIANDO...";

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    body: new FormData(this)
  })
  .then(() => {
    alert("Obrigado! Mensagem enviada com sucesso.");
    this.reset();
    btn.disabled = false;
    btn.innerText = "ENVIAR MENSAGEM";
  })
  .catch((error) => {
    console.error('Erro!', error.message);
    alert("Erro ao enviar. Verifique sua conexão.");
    btn.disabled = false;
    btn.innerText = "ENVIAR MENSAGEM";
  });
});
</script>

</body>
</html>
